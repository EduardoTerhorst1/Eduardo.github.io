<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Gerador de Exercícios de Soma</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f2f2f2;
        }
        .container {
            width: 420px;
            margin: 60px auto;
            background: white;
            padding: 25px;
            border-radius: 8px;
        }
        h2 {
            text-align: center;
        }
        label {
            margin-top: 12px;
            display: block;
        }
        input, select, button {
            width: 100%;
            padding: 8px;
            margin-top: 6px;
        }
        button {
            background: #2e86de;
            color: white;
            border: none;
            margin-top: 20px;
            cursor: pointer;
        }
        button:hover {
            background: #1b4f72;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Gerador de Exercícios de Soma</h2>

    <form method="POST">
        <label>Quantos exercícios?</label>
        <input type="number" name="exercicios" min="1" required>

        <label>Quantos números por exercício? (PAR)</label>
        <input type="number" name="numeros" min="2" max="14" step="2" required>

        <label>Tipo de número</label>
        <select name="tipo" required>
            <option value="dezena">Dezena</option>
            <option value="centena">Centena</option>
            <option value="milhar">Milhar</option>
        </select>

        <button type="submit">Gerar PDF</button>
    </form>
</div>

</body>
</html>
